<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messages | PIET Alumni Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="/modern.css">
</head>

<body>

  <!-- NAVBAR -->
<header class="navbar">
  <div class="container nav-container">

    <!-- LEFT: LOGO + NAME -->
     <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="nav-brand">
      <img src="alumni.png" alt="PIET Logo">
      <span>
        PIET Alumni Connect<br>
        <small>Alumni Society</small>
      </span>
    </div>

    <!-- CENTER: LINKS -->
    <div class="nav-links" id="navbarLinks">
      <a href="index.html">Home</a>
      <a href="alumni.html" data-role="student">Find Alumni</a>
      <a href="jobs.html" data-role="student">Jobs</a>
      <a href="jobs.html" data-role="alumni">Post Job</a>
      <a href="groups.html" data-role="student,alumni">Groups</a>
      <a href="resources.html" data-role="student,alumni">Resources</a>
      <a href="messages.html" data-role="student,alumni">Messages</a>
    </div>

    <!-- RIGHT: USER PROFILE -->
    <div class="nav-user" id="navUser"></div>

  </div>
</header>


  <!-- MAIN -->
  <main class="container">

  <div class="messages-layout">

    <!-- LEFT SIDEBAR -->
    <div id="conversationList">

      <div class="conversation-search">
        <input
          type="text"
          id="conversationSearch"
          placeholder="Search conversations..."
        >
      </div>

      <!-- Conversations injected here -->
    </div>

    <!-- RIGHT CHAT -->
    <div class="chat-panel">

      <div class="chat-header">

        <div class="chat-avatar" id="chatAvatar">
          ?
        </div>

        <div>
          <h2 id="chatTitle">
            Select a conversation
          </h2>

          <small id="chatStatus">
            Click a conversation to start chatting
          </small>
        </div>

      </div>

      <div id="chatBox">

        <div class="empty-chat">

          <h3>
            Welcome to Messages
          </h3>

          <p>
            Select a conversation from the left
            to start chatting.
          </p>

        </div>

      </div>

      <form id="chatForm">

        <input
          type="text"
          id="messageInput"
          placeholder="Type your message..."
          required
        >

        <button type="submit" class="send-btn">
          Send
        </button>

      </form>

    </div>

  </div>

</main>

  <!-- JS -->
  <script src="api.js"></script>
  <script src="protect.js"></script>
  <script src="roleNavbar.js"></script>
  <script src="logout.js"></script>
  <script src="navbarUser.js"></script>
  <script src="mobileNav.js"></script>


  <!-- Socket.io -->
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

  <script>
    const socket = io("https://alumni-connect-portal-w0fm.onrender.com", {
      withCredentials: true,
      transports: ["websocket"]
    });

    const chatBox = document.getElementById("chatBox");
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");

    let receiverId = null;
    let senderId;

    async function init() {
      chatBox.innerHTML = `
  <div style="padding:20px;color:#666">
    Select a conversation to start chatting
  </div>
`;
    const user =await apiCall("/api/auth/me");
    senderId = user.id;
    loadConversations();
}
  init();

    // Load previous messages
    async function loadMessages() {
      chatBox.innerHTML = "<p>Loading messages...</p>";

      const res = await apiCall(`/api/messages/${receiverId}`, "GET", null, true);
      chatBox.innerHTML = "";

      if (!res || res.length === 0) {
      chatBox.innerHTML = "<p>No messages yet.</p>";
      return;
    }

      res.forEach(msg => {
        const isMe = msg.sender_id == senderId;
        appendMessage(msg.message_text, isMe);
      });

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Append message bubble
    function appendMessage(text, isMe) {
      const div = document.createElement("div");
      div.className = "chat-message" + (isMe ? " me" : "");
      div.innerText = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Receive realtime message
    socket.on("newMessage", (data) => {
      if (data.senderId == receiverId) {
        appendMessage(data.message, false);
      }
    });

    // Send message
    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const message = messageInput.value.trim();
      if (!message) return;

      // Save to DB
      await apiCall(
        "/api/messages",
        "POST",
        { receiverId, message },
        true
      );
      if (chatBox.innerHTML.includes("No messages yet")) {
      chatBox.innerHTML = "";
      }
      appendMessage(message, true);
      messageInput.value = "";
    });

  async function loadConversations() {
  const users =
    await apiCall(
      "/api/messages/conversations"
    );

  const list =
  document.getElementById(
    "conversationList"
  );

const searchBox =
  list.querySelector(".conversation-search");

list.innerHTML = "";

list.appendChild(searchBox);

  users.forEach(user => {
    list.innerHTML += `
<div
  class="conversation-item"
  onclick="openChat(${user.id})"
>

  <div class="conversation-avatar">
    ${user.name.charAt(0).toUpperCase()}
  </div>

  <div class="conversation-info">

    <div class="conversation-name">
      ${user.name}
    </div>

    <div class="conversation-preview">
      Click to open chat
    </div>

  </div>

</div>
`;
  });
}

async function openChat(id) {
  chatForm.style.display = "flex";
  receiverId = id;

  const profile =
    await apiCall(
      `/api/profile/${id}`
    );

  document.getElementById(
    "chatTitle"
  ).textContent =
    profile.name;

    document.getElementById("chatAvatar")
  .textContent =
  profile.name.charAt(0).toUpperCase();

document.getElementById("chatStatus")
  .textContent =
  "Online";
  socket.emit("joinRoom", {
  senderId: Number(senderId),
  receiverId: Number(receiverId)
});
  loadMessages();
}
  </script>

</body>
</html>
